workflows:
  meow-ios-build:
    name: meow-ios CI Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default

      vars:
        XCODE_WORKSPACE: "meow-ios.xcworkspace"
        XCODE_SCHEME: "meow-ios"
        BUNDLE_ID: "com.example.meowios"

    scripts:
      - name: Checkout
        script: |
          git submodule update --init --recursive

      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Set up code signing (auto)
        script: |
          xcode-project use-profiles || true

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - you@example.com
        notify:
          success: true
          failure: true
